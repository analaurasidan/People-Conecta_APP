<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Top Navigation Anchor -->
<header class="bg-surface-bright sticky top-0 z-50 flex justify-between items-center w-full px-lg py-md max-w-screen-xl mx-auto">
<div class="flex items-center gap-md">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface-variant">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">People Conecta</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary">close</span>
</button>
</header>
<main class="flex-grow w-full max-w-md mx-auto px-md py-lg flex flex-col gap-xl">
<!-- Progress Bar Section -->
<section class="flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Paso 3 de 8</span>
<span class="font-label-md text-label-md text-primary font-bold">35% completado</span>
</div>
<div class="h-2 w-full bg-sand-100 rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[37.5%] transition-all duration-500 ease-out"></div>
</div>
</section>
<!-- Headline -->
<section>
<h2 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">¿Cuándo y dónde?</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Define el momento perfecto para conectar con otros en Mar del Plata.</p>
</section>
<!-- Date & Time Picker Group -->
<section class="space-y-lg">
<div class="bg-white rounded-xl p-md shadow-sm border border-sand-100">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<h3 class="font-headline-sm text-headline-sm text-sand-800">Fecha y Hora</h3>
</div>
<!-- iOS Style Visual Representation of Pickers -->
<div class="grid grid-cols-2 gap-md h-40 relative overflow-hidden">
<!-- Date Column -->
<div class="flex flex-col items-center justify-center relative">
<div class="absolute inset-0 ios-picker-mask z-10"></div>
<div class="flex flex-col gap-2 py-4">
<span class="text-on-surface-variant/40 font-label-md text-label-md">Lun, 12 Mayo</span>
<span class="text-on-surface font-headline-sm text-headline-sm font-bold scale-110">Mar, 13 Mayo</span>
<span class="text-on-surface-variant/40 font-label-md text-label-md">Mie, 14 Mayo</span>
</div>
</div>
<!-- Time Column -->
<div class="flex flex-col items-center justify-center relative border-l border-sand-100">
<div class="absolute inset-0 ios-picker-mask z-10"></div>
<div class="flex flex-col gap-2 py-4">
<span class="text-on-surface-variant/40 font-label-md text-label-md">09:30 AM</span>
<span class="text-on-surface font-headline-sm text-headline-sm font-bold scale-110">10:00 AM</span>
<span class="text-on-surface-variant/40 font-label-md text-label-md">10:30 AM</span>
</div>
</div>
<!-- Selection Indicator Bar -->
<div class="absolute top-1/2 left-0 right-0 h-10 -translate-y-1/2 bg-secondary-container/30 pointer-events-none rounded-lg"></div>
</div>
</div>
<!-- Location Section -->
<div class="bg-white rounded-xl p-md shadow-sm border border-sand-100">
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-primary">location_on</span>
<h3 class="font-headline-sm text-headline-sm text-sand-800">Ubicación</h3>
</div>
<div class="space-y-md">
<div class="relative">
<input class="w-full bg-sand-50 border-none rounded-full px-xl py-md font-body-md text-on-surface placeholder:text-sand-700/50 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Zona / Punto de referencia" type="text"/>
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/60">search</span>
</div>
<!-- Map Placeholder -->
<div class="w-full h-48 rounded-xl overflow-hidden relative group">
<img alt="Mapa de Mar del Plata" class="w-full h-full object-cover grayscale-[20%] brightness-95 group-hover:scale-105 transition-transform duration-700" data-alt="A clean and artistic minimalist map illustration of a coastal city like Mar del Plata. The map uses a soft palette of sand yellows and deep navy blues for the water. Streets are represented by thin, elegant white lines. The overall aesthetic is breathable and modern, feeling like a high-end lifestyle application map view with soft ambient lighting." data-location="Mar del Plata" src="https://lh3.googleusercontent.com/aida-public/AB6AXuALz52XamzyBrb8DJqgnv--iXOjBPgTNwYhBMzR6natjHvsyTG6xA8EUgB7AYw3S-TD1WnwcU53QwtCdzFlGhABNt7Lsxd202QBMibscd9T3bGB0Q1x_i_NiwbgmbCvKudEdYcEYLOi0vQaXKfNnWyxX0KMMjonRcccOLslinV_HqYSeitBzwuypX4scfbLqIV4UU35xvKPk7ac1HjpxYWHzQIy1gWT8UDZhXFJaLOJ0fVWQSIYpjGA7lA2yQRNvLWFKdIf_jm4pMU"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute bottom-md left-md bg-white/90 backdrop-blur-md px-md py-xs rounded-full shadow-sm">
<p class="font-label-sm text-label-sm text-primary">Mar del Plata, Argentina</p>
</div>
</div>
</div>
</div>
</section>
<!-- Spacer for FAB/Fixed Button -->
<div class="h-32"></div>
</main>
<!-- Footer Action -->
<div class="fixed bottom-0 left-0 right-0 p-lg bg-surface-bright/80 backdrop-blur-xl border-t border-sand-100 flex justify-center z-50">
<button class="w-full max-w-md bg-primary text-white font-headline-sm text-headline-sm py-md rounded-full shadow-lg active:scale-95 transition-all flex justify-center items-center gap-sm">
            Siguiente
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Micro-interaction Script -->
<script>
        // Simple scale effect on interaction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
            btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
        });
    </script>
</body></html>
