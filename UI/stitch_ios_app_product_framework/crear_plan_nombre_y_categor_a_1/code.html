<!-- Micro-interaction Scripts -->
<script>
        function toggleChip(el) {
            // Check if active
            const isActive = el.classList.contains('active');
            
            // Clear other active chips (Single selection logic for categories)
            document.querySelectorAll('.active').forEach(chip => {
                chip.classList.remove('active', 'bg-primary');
                chip.classList.add('bg-sand-50');
            });

            if (!isActive) {
                el.classList.add('active', 'bg-primary');
                el.classList.remove('bg-sand-50');
            }
        }

        // Slight entrance animation
        window.addEventListener('load', () => {
            const sheet = document.getElementById('createPlanSheet');
            sheet.style.transform = 'translateY(100%)';
            setTimeout(() => {
                sheet.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
